<title>Southeast Asia Map - Standalone</title>
<style>
  :root {
    --forest: #005c40;
    --forest-dark: #003326;
    --parchment: #e8e1cd;
    --paper: #f8f5ee;
    --inactive-stroke: #d4cbb2;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    color: var(--forest-dark);
    font-family: Georgia, "Times New Roman", serif;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .sheet {
    width: min(92vw, 860px);
    background: var(--paper);
    border: 1px solid rgba(0, 92, 64, 0.2);
    padding: 28px 32px 40px;
    position: relative;
  }

  .corner { position: absolute; width: 14px; height: 14px; }
  .tl { left: 14px; top: 14px; border-left: 0.5px solid var(--forest); border-top: 0.5px solid var(--forest); }
  .tr { right: 14px; top: 14px; border-right: 0.5px solid var(--forest); border-top: 0.5px solid var(--forest); }
  .bl { left: 14px; bottom: 14px; border-left: 0.5px solid var(--forest); border-bottom: 0.5px solid var(--forest); }
  .br { right: 14px; bottom: 14px; border-right: 0.5px solid var(--forest); border-bottom: 0.5px solid var(--forest); }

  .heading {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }

  h1 { margin: 0; font-size: clamp(1.4rem, 2.5vw, 1.8rem); font-style: italic; font-weight: 400; color: var(--forest-dark); }
  .coords { margin: 0; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #7c745f; }

  .map-frame { position: relative; margin-top: 20px; aspect-ratio: 700 / 620; width: 100%; }
  .map-frame > svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .graticule line { stroke: var(--forest); stroke-opacity: 0.12; stroke-width: 0.3; }

  .map-svg path {
    fill: var(--parchment) !important;
    stroke: var(--inactive-stroke) !important;
    stroke-width: 0.35 !important;
    stroke-opacity: 0.75 !important;
  }

  .map-svg #th path,
  .map-svg #kh path,
  .map-svg #vn path,
  .map-svg #id path,
  .map-svg #tl path,
  .map-svg #tl- path,
  .map-svg #la,
  .map-svg #la-w path {
    fill: var(--forest) !important;
    stroke: var(--forest-dark) !important;
    stroke-width: 0.35 !important;
    stroke-opacity: 1 !important;
  }

  .map-svg #bn\. { display: none; }

  .labels text {
    fill: var(--forest-dark);
    font-size: 7px;
    letter-spacing: 1.5px;
    text-anchor: middle;
    font-family: Georgia, "Times New Roman", serif;
  }

  .caption { margin-top: 16px; font-size: 12px; color: #526e62; line-height: 1.6; }
</style>
